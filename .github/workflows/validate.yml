# Cold-runner CI stub: fails if machine-specific paths reappear or citations break.
# (Full number-regeneration needs the ~40GB public data + weights; run REPRODUCE.md locally for that.)
name: validate
on: [push, pull_request]
jobs:
  static-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: G1 absolute-path guard
        run: bash real_data/validation/check_paths.sh real_data
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: G3 citation resolver
        run: python3 real_data/validation/check_citations.py real_data/validation/refs.tex --mailto ci@example.com
